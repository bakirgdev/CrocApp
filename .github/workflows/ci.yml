name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  swift-format:
    name: swift-format
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7

      - id: xcode
        run: echo "version=$(cat .xcode-version)" >> "$GITHUB_OUTPUT"

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ steps.xcode.outputs.version }}

      # swift-format ships inside the toolchain, so there is nothing to install.
      - name: Lint formatting
        run: |
          xcrun swift-format lint --recursive --parallel --strict \
            app/CrocApp app/CrocShare CrocKit/Sources

  go:
    name: go
    runs-on: ubuntu-latest
    # crocmobile only ever ships as an Apple target, so analyse the darwin build
    # even though the host is Linux. Keeps the cheap runner without linting a
    # platform the app never runs on.
    env:
      GOOS: darwin
      GOARCH: arm64
    defaults:
      run:
        working-directory: crocmobile
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: crocmobile/go.mod
          cache-dependency-path: crocmobile/go.sum

      - run: go build ./...

      - run: go vet ./...

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: crocmobile

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

  build:
    name: build (${{ matrix.platform }})
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            destination: platform=macOS
          - platform: iOS Simulator
            destination: generic/platform=iOS Simulator
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: crocmobile/go.mod
          cache-dependency-path: crocmobile/go.sum

      - id: xcode
        run: echo "version=$(cat .xcode-version)" >> "$GITHUB_OUTPUT"

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ steps.xcode.outputs.version }}

      - run: brew install xcbeautify

      # ADR 0006: the xcframework is a build artifact, not committed. Nothing
      # in CrocKit or the app compiles until this has run.
      - name: Build Croc.xcframework
        run: scripts/build-xcframework.sh

      - name: Build CrocKit package
        shell: bash
        run: set -o pipefail && swift build --package-path CrocKit 2>&1 | xcbeautify --renderer github-actions

      - name: Build CrocApp
        shell: bash
        working-directory: app
        run: |
          set -o pipefail
          xcodebuild -scheme CrocApp \
            -destination '${{ matrix.destination }}' \
            -derivedDataPath "$RUNNER_TEMP/dd" \
            build \
            | xcbeautify --renderer github-actions
